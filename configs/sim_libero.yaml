# @package _global_

defaults:
  - train
  - override /task: libero_uncond_2cam224_1e-4
  - _self_

ckpt: null
gpu_id: 0

model:
  load_text_encoder: true
  skip_dit_load_from_pretrain: true
  action_dit_pretrained_path: null

EVALUATION:
  task_suite_name: libero_spatial
  task_id: 0
  num_trials: 50
  output_dir: ./evaluate_results/libero/${hydra:runtime.choices.task}/${now:%Y%m%d_%H%M%S}

  # Runtime behavior
  env_num: 1
  num_steps_wait: 30
  replan_steps: 10
  binarize_gripper: true
  use_action_ensembler: false
  visualize_future_video: false

  # Multi-frame observation history (set > 1 to use infer_action_multiframe)
  # N should satisfy (N-1) % 4 == 0 for VAE compatibility (e.g. 1, 5, 9)
  num_obs_history: 1

  # Video attention scale: controls how strongly video KV cache influences
  # action denoising. Values < 1.0 reduce visual over-reliance.
  # Set via model constructor or override at runtime.
  # video_attn_scale: 0.7

  # Action inference
  action_horizon: null
  num_inference_steps: ${eval_num_inference_steps}
  sigma_shift: null
  text_cfg_scale: 1.0
  negative_prompt: ""
  rand_device: cpu
  tiled: false

  # Optional external inputs
  dataset_stats_path: null
  device: cuda

MULTIRUN:
  create_only: false
  task_file: null
  task_suite_names:
    - libero_10
    - libero_goal
    - libero_spatial
    - libero_object
    - libero_long_plus_plus
    - ultra_long
  gpu_id: 0

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
